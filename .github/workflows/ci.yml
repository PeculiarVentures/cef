name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test ./... -v -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npx tsc

      - name: Test
        run: node --test dist/test/cef.test.js

      - name: Build demo bundles
        run: node build-demo.mjs

      - name: Generate API docs
        run: npx typedoc

  interop:
    name: Cross-SDK Interop
    runs-on: ubuntu-latest
    needs: [go, typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install TS dependencies
        run: cd sdk/typescript && npm ci

      - name: Compile TS
        run: cd sdk/typescript && npx tsc

      - name: Run interop tests
        run: node test/interop.mjs

  rust:
    name: Rust SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings -A clippy::type_complexity
